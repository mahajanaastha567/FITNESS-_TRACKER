<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Tracker</title>
    <link rel="stylesheet" href="pro.css">
</head>
<body>

<nav>
    <h2>🌸 Fitness Tracker 🌸</h2>
    <div class="nav-toggle">
        <button class="menu-toggle" onclick="toggleMenu()">☰</button>
    </div>
    <div class="nav-menu">
        <a href="index.html">🏠 Home</a>
        <a href="aboutme (2).html">👤 About Us</a>
        <button onclick="toggleTheme()">🌙</button>
    </div>
</nav>

<!-- Feature Menu Bar -->
<div class="feature-menu">
    <a href="#weight">⚖️ Weight</a>
    <a href="#mealplanner">📅 Meal Plan</a>
    <a href="#workout">🏋️ Workout</a>
</div>

<div class="container">

    <!-- Fitness Mode Selection -->
    <h3>💪 Fitness Mode</h3>
    <div class="mode-selector">
        <label><input type="radio" name="mode" value="weightLoss" onchange="updateMode(this.value)"> ⬇️ Weight Loss</label>
        <label><input type="radio" name="mode" value="weightGain" onchange="updateMode(this.value)"> ⬆️ Weight Gain</label>
        <label><input type="radio" name="mode" value="maintenance" onchange="updateMode(this.value)" checked> ⚖️ Maintenance</label>
    </div>

    <!-- Weight Management -->
    <h3 id="weight">⚖️ Weight Tracking</h3>
    <div class="input-group">
        <input type="number" id="currentWeight" placeholder="Current Weight (kg)" step="0.1">
        <input type="number" id="targetWeight" placeholder="Target Weight (kg)" step="0.1">
        <input type="date" id="weightDate">
        <button onclick="addWeight()">📊 Log Weight</button>
    </div>

    <div id="weightStatus" class="status-box"></div>

    <!-- Monthly Meal Planner -->
    <h3 id="mealplanner">📅 Monthly Meal Planner (By Weight)</h3>
    <div class="input-group">
        <label for="weightRange" style="display: block; margin-bottom: 10px; font-weight: bold;">🏋️ Select Your Weight Range (kg):</label>
        <select id="weightRange" onchange="loadMealPlan()">
            <option value="">-- Select Weight Range --</option>
            <option value="60-70">60-70 kg</option>
            <option value="70-80">70-80 kg</option>
            <option value="80-90">80-90 kg</option>
            <option value="90-100">90-100 kg</option>
            <option value="100-110">100-110 kg</option>
            <option value="110-120">110-120 kg</option>
        </select>
        <label style="display: block; margin-top: 15px; margin-bottom: 10px; font-weight: bold;">🍽️ Diet Preference:</label>
        <div style="display: flex; gap: 20px; margin-bottom: 10px;">
            <label><input type="radio" name="mealPlannerDiet" value="veg" onchange="loadMealPlan()"> 🥗 Vegetarian</label>
            <label><input type="radio" name="mealPlannerDiet" value="nonveg" checked onchange="loadMealPlan()"> 🍖 Non-Vegetarian</label>
        </div>
        <button onclick="loadMealPlan()">📋 View 30-Day Meal Plan</button>
    </div>

    <div id="mealPlannerResult" class="summary-box"></div>

    <!-- Recommended Workout -->
    <h3 id="workout">🏋️ Recommended Workout</h3>
    <div class="input-group">
        <button onclick="displayRecommendedWorkout()">💪 Get Workout Recommendation</button>
    </div>

    <div id="workoutRecommendation" class="summary-box"></div>

    </div>

</div>

<script src="pro.js"></script>
</body>
</html>
